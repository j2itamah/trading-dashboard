<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Dashboard — 10-Account Model</title>
<style>
  :root{
    --bg:#0f1419; --panel:#1a2129; --panel2:#222c37; --line:#2c3742;
    --txt:#e6edf3; --muted:#8b98a5; --green:#3fb950; --red:#f85149;
    --blue:#58a6ff; --amber:#d29922; --accent:#1f6feb;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;padding:24px;max-width:1280px;margin:0 auto}
  h1{font-size:22px;font-weight:700;margin-bottom:2px}
  h2{font-size:15px;font-weight:600;margin:28px 0 12px;color:var(--txt)}
  .sub{color:var(--muted);font-size:12px;margin-bottom:20px}
  .pos{color:var(--green)} .neg{color:var(--red)} .flat{color:var(--muted)}
  .summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:8px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px 16px}
  .card .label{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.04em}
  .card .big{font-size:24px;font-weight:700;margin-top:4px}
  .card .small{font-size:12px;margin-top:2px}
  table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  th,td{padding:9px 12px;text-align:right;border-bottom:1px solid var(--line);font-variant-numeric:tabular-nums}
  th{background:var(--panel2);color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.04em;font-weight:600}
  th:first-child,td:first-child{text-align:left}
  tr:last-child td{border-bottom:none}
  .grid-wrap{overflow-x:auto}
  .gridtbl td.cell{padding:0}
  .cellbox{padding:10px 12px}
  .cellbox .eq{font-size:15px;font-weight:600}
  .cellbox .gr{font-size:12px}
  .bar{height:6px;border-radius:3px;background:var(--line);margin-top:6px;overflow:hidden;display:flex}
  .bar .inv{background:var(--blue);height:100%}
  .bar .csh{background:var(--panel2);height:100%}
  .legend{font-size:11px;color:var(--muted);margin-top:4px}
  .badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:11px;font-weight:600}
  .badge.long{background:rgba(63,185,80,.15);color:var(--green)}
  .badge.short{background:rgba(248,81,73,.15);color:var(--red)}
  .strat{font-weight:600}
  .rule{color:var(--muted);font-size:11px}
  .note{color:var(--amber);font-size:11px;font-style:italic}
  .empty{color:var(--muted);text-align:center;padding:18px;font-style:italic}
  .stratlabel{text-align:left;font-weight:600;background:var(--panel2);white-space:nowrap}
  footer{margin-top:28px;color:var(--muted);font-size:11px;text-align:center}
</style>
</head>
<body>
  <h1>Trading Dashboard</h1>
  <div class="sub" id="sub">10-account model · 5 strategies × 2 exit rules · each book starts at $10,000 and compounds independently</div>

  <div class="summary" id="summary"></div>

  <h2>Strategy × Exit-Rule Grid</h2>
  <div class="grid-wrap"><table class="gridtbl" id="grid"></table></div>
  <div class="legend"><span style="color:var(--blue)">■</span> invested (deployed) &nbsp; <span style="color:var(--muted)">■</span> free cash &nbsp;·&nbsp; each cell shows equity & growth vs $10,000</div>

  <h2>Open Positions</h2>
  <table id="positions"></table>

  <h2>Closed-Trade Summary <span class="rule">(per book)</span></h2>
  <table id="closed"></table>

  <footer id="footer"></footer>

<script>
const fmt = n => (n<0?'-':'') + '$' + Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const pct = n => (n>0?'+':'') + n.toFixed(2) + '%';
const cls = n => n>0?'pos':(n<0?'neg':'flat');
const esc = s => String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

async function load(){
  let d;
  try{ d = await (await fetch('data.json?t='+Date.now())).json(); }
  catch(e){ document.getElementById('summary').innerHTML='<div class="card"><div class="label">Error</div><div class="small">Could not load data.json</div></div>'; return; }

  const t = d.totals||{};
  document.getElementById('sub').textContent = (d.model||'10-account model') + ' · each book starts at $10,000 and compounds independently';

  document.getElementById('summary').innerHTML = [
    card('Total Equity', fmt(t.equity||0), 'vs '+fmt(t.starting||0)+' start'),
    card('Total P&L', '<span class="'+cls(t.pnl_dollars||0)+'">'+fmt(t.pnl_dollars||0)+'</span>', '<span class="'+cls(t.pnl_pct||0)+'">'+pct(t.pnl_pct||0)+'</span>'),
    card('Books', (t.book_count||0)+'', '5 strategies × 2 rules'),
    card('Open Positions', (t.open_positions||0)+'', 'across all books')
  ].join('');

  buildGrid(d);
  buildPositions(d.open_positions||[]);
  buildClosed(d.books||[], d.low_sample_threshold||20);

  document.getElementById('footer').textContent = 'Last updated: ' + (d.generated_at ? new Date(d.generated_at).toLocaleString() : '—');
}

function card(label, big, small){
  return '<div class="card"><div class="label">'+label+'</div><div class="big">'+big+'</div><div class="small flat">'+small+'</div></div>';
}

function cellHtml(b){
  if(!b) return '<div class="cellbox flat">—</div>';
  const inv = Math.max(0, Math.min(100, b.invested_pct||0));
  const csh = Math.max(0, 100-inv);
  return '<div class="cellbox">'
    + '<div class="eq">'+fmt(b.total_equity||0)+'</div>'
    + '<div class="gr '+cls(b.growth_dollars||0)+'">'+fmt(b.growth_dollars||0)+' ('+pct(b.growth_pct||0)+')</div>'
    + '<div class="bar"><div class="inv" style="width:'+inv+'%"></div><div class="csh" style="width:'+csh+'%"></div></div>'
    + '<div class="legend">cash '+fmt(b.free_cash||0)+' · inv '+fmt(b.deployed_capital||0)+' · '+(b.open_count||0)+' open</div>'
    + '</div>';
}

function buildGrid(d){
  const strats = d.strategies||[];
  const rules = d.exit_rules||['hold_24hr','sell_eod'];
  let h = '<thead><tr><th>Strategy</th>'+rules.map(r=>'<th>'+esc(r)+'</th>').join('')+'</tr></thead><tbody>';
  for(const s of strats){
    h += '<tr><td class="stratlabel">'+esc(s)+'</td>';
    for(const r of rules){
      const b = (d.grid&&d.grid[s]&&d.grid[s][r])||null;
      h += '<td class="cell">'+cellHtml(b)+'</td>';
    }
    h += '</tr>';
  }
  h += '</tbody>';
  document.getElementById('grid').innerHTML = h;
}

function buildPositions(rows){
  const el = document.getElementById('positions');
  if(!rows.length){ el.outerHTML = '<table id="positions"><tbody><tr><td class="empty" colspan="7">No open positions.</td></tr></tbody></table>'; return; }
  let h='<thead><tr><th>Book</th><th>Asset</th><th>Side</th><th>Stake</th><th>Shares</th><th>Entry</th><th>Entered</th></tr></thead><tbody>';
  for(const p of rows){
    const side = (p.direction==='SHORT')?'<span class="badge short">SHORT</span>':'<span class="badge long">LONG</span>';
    h += '<tr><td>'+esc(p.portfolio)+' <span class="rule">'+esc(p.exit_rule)+'</span></td>'
      + '<td>'+esc(p.asset)+'</td><td style="text-align:left">'+side+'</td>'
      + '<td>'+fmt(p.stake_amount||0)+'</td><td>'+(p.shares||0)+'</td>'
      + '<td>'+fmt(p.entry_price||0)+'</td>'
      + '<td>'+(p.entry_time?new Date(p.entry_time).toLocaleString():'—')+'</td></tr>';
  }
  h+='</tbody>';
  el.innerHTML = h;
}

function buildClosed(books, lowSample){
  const el = document.getElementById('closed');
  let h='<thead><tr><th>Book</th><th>Closed</th><th>Wins</th><th>Losses</th><th>Win&nbsp;Rate</th><th>Total&nbsp;P&L</th><th></th></tr></thead><tbody>';
  for(const b of books){
    const c=b.closed||{};
    const wr = (c.win_rate_pct==null)?'—':c.win_rate_pct.toFixed(1)+'%';
    const small = c.low_sample;
    h += '<tr><td>'+esc(b.portfolio)+' <span class="rule">'+esc(b.exit_rule)+'</span></td>'
      + '<td>'+(c.count||0)+'</td><td>'+(c.wins||0)+'</td><td>'+(c.losses||0)+'</td>'
      + '<td>'+wr+'</td>'
      + '<td class="'+cls(c.total_pnl_dollars||0)+'">'+fmt(c.total_pnl_dollars||0)+'</td>'
      + '<td style="text-align:left">'+(small?'<span class="note">small sample — not yet meaningful</span>':'')+'</td></tr>';
  }
  h+='</tbody>';
  el.innerHTML = h;
}

load();
</script>
</body>
</html>
