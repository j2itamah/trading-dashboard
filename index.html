<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Analyst — Dashboard</title>
<style>

  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Spline+Sans+Mono:wght@400;500;600&family=Spline+Sans:wght@400;500;600;700&display=swap');
  :root {
    --bg: #f4f3ee; --panel: #ffffff; --ink: #1a1d1a; --ink-soft: #6b7269;
    --line: #e4e2d8; --green: #1d9d6b; --green-bg: #e6f5ee; --red: #d6485a;
    --red-bg: #fbeaec; --accent: #3a5a78; --accent-bg: #eaf0f5; --gold: #c08a2d;
    --shadow: 0 1px 2px rgba(26,29,26,.04), 0 8px 24px rgba(26,29,26,.05);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Spline Sans', sans-serif; background: var(--bg); color: var(--ink);
    padding: 32px 24px 60px; min-height: 100vh;
    background-image: radial-gradient(circle at 1px 1px, rgba(26,29,26,.025) 1px, transparent 0);
    background-size: 22px 22px;
  }
  .wrap { max-width: 1080px; margin: 0 auto; }
  header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 28px; flex-wrap: wrap; gap: 16px; }
  .title-block h1 { font-family: 'Fraunces', serif; font-size: 34px; font-weight: 600; letter-spacing: -.5px; display: flex; align-items: center; gap: 12px; }
  .title-block .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 4px var(--green-bg); animation: pulse 2.4s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .title-block p { color: var(--ink-soft); font-size: 13px; margin-top: 4px; font-family: 'Spline Sans Mono', monospace; }
  .updated { text-align: right; font-size: 12px; color: var(--ink-soft); font-family: 'Spline Sans Mono', monospace; }
  .updated strong { color: var(--ink); display: block; font-size: 13px; }
  .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 14px; }
  .kpi { background: var(--panel); border-radius: 16px; padding: 20px 22px; box-shadow: var(--shadow); border: 1px solid var(--line); position: relative; overflow: hidden; }
  .kpi .label { font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--ink-soft); font-weight: 600; }
  .kpi .value { font-family: 'Fraunces', serif; font-size: clamp(22px, 4.2vw, 38px); font-weight: 600; margin-top: 8px; letter-spacing: -1px; line-height: 1.05; overflow-wrap: anywhere; }
  .kpi .sub { font-size: 12px; color: var(--ink-soft); margin-top: 8px; font-family: 'Spline Sans Mono', monospace; }
  .kpi .bar { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
  .kpi.pos .value { color: var(--green); } .kpi.pos .bar { background: var(--green); }
  .kpi.neg .value { color: var(--red); } .kpi.neg .bar { background: var(--red); }
  .kpi.neutral .bar { background: var(--accent); }
  .grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 14px; margin-top: 14px; }
  .panel { background: var(--panel); border-radius: 16px; padding: 22px; box-shadow: var(--shadow); border: 1px solid var(--line); }
  .panel h2 { font-family: 'Spline Sans Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--ink-soft); font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .panel h2::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }
  .row { display: flex; align-items: center; justify-content: space-between; padding: 11px 0; border-bottom: 1px solid var(--line); }
  .row:last-child { border-bottom: none; }
  .row .name { font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 10px; }
  .row .name .tag { font-family: 'Spline Sans Mono', monospace; font-size: 10px; background: var(--accent-bg); color: var(--accent); padding: 2px 7px; border-radius: 5px; font-weight: 600; }
  .row .metrics { display: flex; gap: 18px; align-items: center; }
  .row .metric { text-align: right; }
  .row .metric .m-val { font-family: 'Spline Sans Mono', monospace; font-weight: 600; font-size: 14px; }
  .row .metric .m-lab { font-size: 10px; color: var(--ink-soft); text-transform: uppercase; letter-spacing: .5px; }
  .pos-text { color: var(--green); } .neg-text { color: var(--red); } .zero-text { color: var(--ink-soft); }
  .wr-bar { width: 54px; height: 6px; background: var(--line); border-radius: 3px; overflow: hidden; }
  .wr-bar span { display: block; height: 100%; border-radius: 3px; }
  .daily-row { display: grid; grid-template-columns: 1fr auto auto; gap: 14px; align-items: center; padding: 12px 14px; border-radius: 10px; margin-bottom: 8px; }
  .daily-row.pos { background: var(--green-bg); } .daily-row.neg { background: var(--red-bg); }
  .daily-row .date { font-weight: 600; font-size: 14px; }
  .daily-row .date small { display: block; font-size: 11px; color: var(--ink-soft); font-weight: 400; }
  .daily-row .trades { font-size: 12px; color: var(--ink-soft); font-family: 'Spline Sans Mono', monospace; }
  .daily-row .pnl { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600; }
  .conf-row { display: grid; grid-template-columns: 80px 1fr 30px; gap: 12px; align-items: center; padding: 8px 0; }
  .conf-row .band { font-family: 'Spline Sans Mono', monospace; font-size: 12px; color: var(--ink-soft); }
  .conf-bar { height: 22px; background: var(--bg); border-radius: 6px; overflow: hidden; position: relative; }
  .conf-bar span { display: block; height: 100%; background: linear-gradient(90deg, var(--accent), #5b7e9e); border-radius: 6px; transition: width 1s ease; }
  .conf-row .cnt { font-weight: 600; font-family: 'Spline Sans Mono', monospace; text-align: right; }
  .footnote { margin-top: 22px; padding: 16px 20px; background: var(--accent-bg); border-radius: 12px; font-size: 13px; color: var(--accent); line-height: 1.55; border-left: 3px solid var(--accent); }
  .footnote strong { font-weight: 700; }
  .status { text-align: center; padding: 40px; color: var(--ink-soft); font-family: 'Spline Sans Mono', monospace; font-size: 13px; }
  .status.err { color: var(--red); }
  @media (max-width: 720px) { .kpis { grid-template-columns: repeat(2, 1fr); } .grid { grid-template-columns: 1fr; } }
@media (max-width: 720px) { .toggle-row{flex-direction:column;align-items:stretch;} .portfolio-toggle{border-radius:14px;width:100%;} .toggle-btn{flex:1 1 30%;text-align:center;font-size:12px;padding:9px 8px;} }

.portfolio-toggle{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:6px;box-shadow:var(--shadow);margin:0;max-width:100%;}
.toggle-btn{font-family:'Spline Sans',sans-serif;font-size:13px;font-weight:600;color:var(--ink-soft);background:transparent;border:none;border-radius:999px;padding:8px 16px;cursor:pointer;transition:all .15s ease;white-space:nowrap;}
.toggle-btn:hover{color:var(--ink);}
.toggle-btn.on{background:var(--accent-bg);color:var(--accent);box-shadow:inset 0 0 0 1px var(--accent);}
.toggle-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin:18px 0 22px;}
#active-label{font-family:'Spline Sans Mono',monospace;font-size:12px;color:var(--ink-soft);letter-spacing:.02em;}#book-tech{font-size:11px;color:var(--ink-soft);margin-top:4px;line-height:1.4;}#book-plain{font-size:10.5px;font-style:italic;color:var(--ink-soft);opacity:.85;margin-top:2px;line-height:1.4;}



/* --- spacing polish: more breathing room --- */
.kpis { margin-bottom: 18px !important; gap: 16px !important; }
.grid { gap: 18px !important; margin-top: 18px !important; }
.panel { padding: 24px !important; }
.wrap { padding-bottom: 40px; }

/* --- segmented exit-rule switch (distinct from pills) --- */
.exit-switch-wrap { display:flex; justify-content:center; margin: 4px 0 16px; }
.exit-switch { position:relative; display:inline-flex; background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:4px; box-shadow:var(--shadow); }
.exit-switch .thumb { position:absolute; top:4px; left:4px; height:calc(100% - 8px); width:calc(50% - 4px); background:var(--accent); border-radius:9px; transition:transform .22s cubic-bezier(.4,0,.2,1); box-shadow:0 1px 3px rgba(58,90,120,.35); }
.exit-switch.eod .thumb { transform:translateX(100%); }
.exit-switch button { position:relative; z-index:1; border:none; background:transparent; font-family:'Spline Sans',sans-serif; font-weight:600; font-size:13px; color:var(--ink-soft); padding:9px 26px; cursor:pointer; border-radius:9px; transition:color .2s; white-space:nowrap; min-width:120px; }
.exit-switch button.on { color:#fff; }

/* --- equity summary (Questrade-clean) --- */
.equity-summary { display:grid; grid-template-columns:1.3fr 1fr; gap:16px; margin:0 0 18px; }
.eq-card { background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:22px 24px; box-shadow:var(--shadow); }
.eq-card .eq-label { font-family:'Spline Sans Mono',monospace; font-size:11px; text-transform:uppercase; letter-spacing:1.2px; color:var(--ink-soft); font-weight:600; }
.eq-card .eq-equity { font-family:'Fraunces',serif; font-size:clamp(28px,5vw,42px); font-weight:600; letter-spacing:-1px; margin-top:6px; line-height:1.05; }
.eq-card .eq-growth { font-family:'Spline Sans Mono',monospace; font-size:14px; font-weight:600; margin-top:8px; }
.eq-card
.split-card .split-bar { display:flex; height:14px; border-radius:7px; overflow:hidden; margin:14px 0 12px; background:var(--bg); }
.split-bar .cash { background:linear-gradient(90deg,var(--green),#3bbd8a); }
.split-bar .inv { background:linear-gradient(90deg,var(--accent),#5b7e9e); }
.split-legend { display:flex; justify-content:space-between; font-size:12px; }
.split-legend .lg { display:flex; flex-direction:column; gap:2px; }
.split-legend .lg .k { font-family:'Spline Sans Mono',monospace; font-size:10.5px; text-transform:uppercase; letter-spacing:.6px; color:var(--ink-soft); display:flex; align-items:center; gap:6px; }
.split-legend .lg .k::before { content:''; width:9px; height:9px; border-radius:3px; }
.split-legend .lg.cash .k::before { background:var(--green); }
.split-legend .lg.inv .k::before { background:var(--accent); }
.split-legend .lg .v { font-weight:600; font-size:15px; }

/* --- positions + LONG/SHORT badges --- */
.pos-row { display:flex; align-items:center; justify-content:space-between; padding:11px 0; border-bottom:1px solid var(--line); }
.pos-row:last-child { border-bottom:none; }
.pos-row .asset { font-weight:600; font-size:14px; display:flex; align-items:center; gap:10px; }
.badge { font-family:'Spline Sans Mono',monospace; font-size:10px; font-weight:700; padding:3px 9px; border-radius:6px; letter-spacing:.5px; }
.badge.long { background:var(--green-bg); color:var(--green); }
.badge.short { background:var(--red-bg); color:var(--red); }
.pos-row .pos-meta { font-family:'Spline Sans Mono',monospace; font-size:12px; color:var(--ink-soft); }

@keyframes spin { to { transform:rotate(360deg); } }
.ptr-hint { text-align:center; font-family:'Spline Sans Mono',monospace; font-size:11px; color:var(--ink-soft); height:0; overflow:hidden; transition:height .2s; }
.ptr-hint.show { height:22px; }

@media (max-width:640px){ .equity-summary{ grid-template-columns:1fr; } .exit-switch button{ padding:9px 18px; min-width:100px; } }

.sub-h{font-size:13px;color:var(--ink-soft);margin-top:6px;font-family:"Spline Sans Mono",monospace;}
.dot{width:11px;height:11px;border-radius:50%;background:var(--green);display:inline-block;box-shadow:0 0 0 4px var(--green-bg);}
.footnote{font-family:"Spline Sans Mono",monospace;font-size:11.5px;color:var(--gold);background:#fbf3e0;border:1px solid #ecdcb5;border-radius:10px;padding:9px 14px;margin:14px 0 4px;}

/* description spacing polish (tweak) */
#active-label{ margin:18px 0 22px; }
#active-label strong{ font-size:13px; }
#book-plain{ margin-top:6px !important; line-height:1.5 !important; }
@media (max-width:640px){ #active-label{ margin:22px 0 26px; padding:0 4px; } }

/* description spacing polish (tweak) */
#active-label{ margin:18px 0 22px; }
#active-label strong{ font-size:13px; }
#book-plain{ margin-top:6px !important; line-height:1.5 !important; }
@media (max-width:640px){ #active-label{ margin:22px 0 26px; padding:0 4px; } }

  /* trade detail modal */
.trade-clk{cursor:pointer;transition:background .12s;}
.trade-clk:hover{background:rgba(0,0,0,.04);}
.chev{float:right;opacity:.35;font-weight:700;padding-left:8px;}
.tm-overlay{position:fixed;inset:0;background:rgba(20,22,28,.55);display:none;align-items:flex-start;justify-content:center;z-index:9999;overflow-y:auto;padding:40px 16px;}
.tm-overlay.open{display:flex;}
.tm-modal{background:var(--card,#fff);border-radius:16px;max-width:640px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.28);overflow:hidden;font-family:inherit;}
.tm-head{padding:20px 24px;border-bottom:1px solid var(--line,#eee);display:flex;align-items:center;justify-content:space-between;gap:12px;}
.tm-head h3{margin:0;font-size:22px;letter-spacing:-.01em;}
.tm-head .tm-sub{font-size:12px;color:var(--muted,#888);margin-top:2px;text-transform:uppercase;letter-spacing:.06em;}
.tm-badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;margin-left:6px;vertical-align:middle;}
.tm-badge.long{background:#e6f4ea;color:#1a7f37;}
.tm-badge.short{background:#fdecec;color:#c0362c;}
.tm-badge.open{background:#e8f0fe;color:#1a56db;}
.tm-badge.closed{background:#f1f1f1;color:#555;}
.tm-close{background:none;border:none;font-size:24px;line-height:1;cursor:pointer;color:var(--muted,#999);padding:4px 8px;border-radius:8px;}
.tm-close:hover{background:rgba(0,0,0,.06);}
.tm-body{padding:20px 24px;}
.tm-cols{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
@media(max-width:520px){.tm-cols{grid-template-columns:1fr;}}
.tm-col h4{margin:0 0 10px;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted,#999);}
.tm-kv{display:flex;justify-content:space-between;gap:12px;padding:5px 0;font-size:13px;border-bottom:1px dashed var(--line,#f0f0f0);}
.tm-kv .k{color:var(--muted,#888);}
.tm-kv .v{font-weight:600;text-align:right;}
.tm-pnl-banner{margin:16px 0;padding:14px 16px;border-radius:12px;text-align:center;font-size:24px;font-weight:700;}
.tm-pnl-banner.pos-text{background:#e6f4ea;color:#1a7f37;}
.tm-pnl-banner.neg-text{background:#fdecec;color:#c0362c;}

.tm-context{margin-top:16px;font-size:13px;}
.tm-context .hl{font-style:italic;color:var(--ink,#333);margin-top:6px;line-height:1.4;}
.tm-foot{padding:14px 24px;border-top:1px solid var(--line,#eee);display:flex;gap:10px;flex-wrap:wrap;}
.tm-btn{font:inherit;font-size:13px;padding:8px 14px;border-radius:9px;border:1px solid var(--line,#ddd);background:var(--card,#fff);cursor:pointer;}
.tm-btn:hover{background:rgba(0,0,0,.04);}
.tm-btn.copied{background:#e6f4ea;border-color:#1a7f37;color:#1a7f37;}
</style>

<body>

<div class="wrap">
  <header>
    <div class="title-block">
      <h1><span class="dot"></span>Trading Analyst</h1>
    </div>
    <div class="updated">
      <span>Last updated</span>
      <strong id="upd-date">—</strong>
    </div>
  </header>

  <div class="ptr-hint" id="ptr-hint">↓ pull to refresh</div>

  <div class="exit-switch-wrap">
    <div class="exit-switch" id="exit-switch">
      <span class="thumb"></span>
      <button data-rule="hold_24hr" class="on">24hr Hold</button>
      <button data-rule="sell_eod">Early Exit</button>
    </div>
  </div>

  <div class="portfolio-toggle" id="portfolio-toggle"></div>
  <div id="active-label"></div>

  <div id="content">
    <div class="status">Loading…</div>
  </div>
</div>

<script>

const DATA_URL = 'data.json?t=' + Date.now();
const STRAT_LABELS = { news_only:'News Only', news_plus_ta:'Trend Gate', mean_reversion:'Mean Revert', trend_strict:'Trend Strict', strict:'All Signals' };
const STRAT_DESC = {
  news_only:'Takes every qualifying news signal. No filter (baseline).',
  news_plus_ta:'News signals, lightly filtered by RSI.',
  mean_reversion:'Buys oversold dips. RSI + trend confirmation.',
  trend_strict:'Trend-following. Needs price above MA20 + momentum.',
  strict:'Tightest filter. RSI + trend + momentum + volume.'
};
const RULE_LABEL = { hold_24hr:'24hr Hold', sell_eod:'Early Exit' };

let DATA = null;
let sel = {
  strategy: localStorage.getItem('dash_strategy') || 'news_only',
  rule: localStorage.getItem('dash_rule') || 'hold_24hr'
};

const fmtMoney = n => '$' + Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtPrice = n => {
  const v = Number(n||0), a = Math.abs(v);
  const digits = a>0 && a<0.01 ? 8 : (a<1 ? 4 : 2);
  return '$' + v.toLocaleString('en-US',{minimumFractionDigits:digits,maximumFractionDigits:digits});
};
const fmtPct = n => (n>0?'+':'') + Number(n||0).toFixed(2) + '%';
const fmtNum = n => Number(n||0).toLocaleString('en-US',{maximumFractionDigits:4});
const signCls = n => n>0?'pos-text':(n<0?'neg-text':'zero-text');
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const minsLabel = m => { if(m==null) return '—'; const h=Math.floor(m/60), mm=Math.round(m%60); return h>0?(h+'h '+mm+'m'):(mm+'m'); };
function nonWeekendHours(iso){
  if(!iso) return 0;
  const start=new Date(iso), end=new Date(); let hours=0;
  for(let t=start.getTime();t<end.getTime();t+=3600000){
    const mid=new Date(t+1800000);
    const wd=new Intl.DateTimeFormat('en-US',{timeZone:'America/New_York',weekday:'short'}).format(mid);
    if(wd!=='Sat'&&wd!=='Sun') hours+=Math.min(3600000,end.getTime()-t)/3600000;
  }
  return hours;
}

// ===== asset class + lifecycle rules (live rule set as of 2026-06-09) =====
// Best-effort crypto detection until publisher emits per-trade asset_class (see MASTER_SPEC).
const CRYPTO_SET = new Set(['BTC','ETH','SOL','XRP','ADA','DOGE','ZEC','LTC','BCH','DOT','AVAX','LINK','MATIC','POL','SHIB','TRX','UNI','ATOM','XLM','ETC','FIL','APT','ARB','OP','INJ','SUI','SEI','TIA','NEAR','ALGO','AAVE','MKR','RUNE','IMX','GRT','SAND','MANA','AXS','CRV','LDO','PEPE','WIF','BONK','HBAR','ICP','VET','EGLD','FTM','THETA','XTZ','EOS','KAS','TON','RNDR','FET','STX','ORDI']);
function assetClass(t){ if(t.asset_class) return t.asset_class; return CRYPTO_SET.has(String(t.asset||'').toUpperCase()) ? 'crypto' : 'stock'; }
function rulesFor(cls){ return cls==='crypto' ? {tp:0.10, sl:0.05, eod:0.02, evalLbl:'10:00 PM ET'} : {tp:0.04, sl:0.02, eod:0.01, evalLbl:'3:45 PM ET'}; }
function tpSlPrices(t){
  const cls=assetClass(t), r=rulesFor(cls), e=Number(t.entry_price)||0, long=(t.direction!=='SHORT');
  return { cls, r, tp: long ? e*(1+r.tp) : e*(1-r.tp), sl: long ? e*(1-r.sl) : e*(1+r.sl) };
}
function holdExpiry(t){
  const cls=assetClass(t);
  if(cls==='crypto') return new Date(new Date(t.entry_time).getTime()+24*3600000);
  let rem = 24 - nonWeekendHours(t.entry_time);
  if(rem<=0) return null;
  let t0=Date.now(), guard=0;
  while(rem>0 && guard++<1000){ t0+=3600000; const wd=new Intl.DateTimeFormat('en-US',{timeZone:'America/New_York',weekday:'short'}).format(new Date(t0-1800000)); if(wd!=='Sat'&&wd!=='Sun') rem-=1; }
  return new Date(t0);
}
function isStale(){ if(!DATA||!DATA.generated_at) return false; return (Date.now()-new Date(DATA.generated_at).getTime()) > 40*60000; }

function book(){ const g=DATA&&DATA.grid&&DATA.grid[sel.strategy]; return g?g[sel.rule]:null; }

function kpiCard(label, value, cls, sub){
  return '<div class="kpi"><div class="label">'+label+'</div><div class="value '+(cls||'')+'">'+value+'</div>'+(sub?'<div class="sub">'+sub+'</div>':'')+'</div>';
}

function groupPanel(title, rows, cols){
  if(!rows || !rows.length) return '<div class="panel"><h2>'+title+'</h2><div class="zero-text" style="font-size:13px;color:var(--ink-soft)">No data yet.</div></div>';
  let body='';
  for(const r of rows){
    const cells = cols.map(c=>{
      let v=r[c.k];
      if(c.fmt==='pct') v=(v==null?'—':fmtPct(v));
      else if(c.fmt==='money') v=(v==null?'—':fmtMoney(v));
      else if(c.fmt==='wr') v=(v==null?'—':(Number(v).toFixed(0)+'%'));
      else if(c.fmt==='mins') v=minsLabel(v);
      else v=(v==null?'—':v);
      const cl = c.sign ? signCls(r[c.k]) : '';
      return '<div class="metric"><div class="m-val '+cl+'">'+v+'</div><div class="m-lab">'+c.lab+'</div></div>';
    }).join('');
    body += '<div class="row"><div class="name">'+esc(r.key)+(r.count!=null?' <span class="tag">'+r.count+'</span>':'')+'</div><div class="metrics">'+cells+'</div></div>';
  }
  return '<div class="panel"><h2>'+title+'</h2>'+body+'</div>';
}

function render(){
  document.getElementById('exit-switch').className = 'exit-switch' + (sel.rule==='sell_eod'?' eod':'');
  document.querySelectorAll('#exit-switch button').forEach(b=>b.classList.toggle('on', b.dataset.rule===sel.rule));
  document.querySelectorAll('#portfolio-toggle button').forEach(b=>b.classList.toggle('on', b.dataset.strat===sel.strategy));
  document.getElementById('active-label').innerHTML =
    '<strong>'+STRAT_LABELS[sel.strategy]+' · '+RULE_LABEL[sel.rule]+'</strong>'+

  const b = book();
  const c = document.getElementById('content');

  const a = b.analytics || {};

  const eq =
    '<div class="equity-summary">'+
      '<div class="eq-card">'+
        '<div class="eq-label">Marked Equity</div>'+

        ''+
      '</div>'+
      '<div class="eq-card split-card">'+
        '<div class="eq-label">Cash / Invested</div>'+

        '<div class="split-legend">'+
          '<div class="lg cash"><span class="k">Free Cash</span><span class="v">'+fmtMoney(b.free_cash)+'</span></div>'+
          '<div class="lg inv" style="text-align:right"><span class="k" style="justify-content:flex-end">Deployed cost</span><span class="v">'+fmtMoney((DATA.open_positions||[]).filter(function(p){return p.book_key===b.book_key;}).reduce(function(s,p){return s+Number(p.stake_amount||0);},0))+'</span></div>'+
        '</div>'+
        '<div class="split-legend" style="margin-top:6px"><div class="lg"><span class="k" style="font-size:11px;color:var(--ink-soft)">Marked value (cost + unrealized)</span></div><div class="lg" style="text-align:right"><span class="v">'+fmtMoney(b.deployed_capital)+'</span></div></div>'+
      '</div>'+
    '</div>';

  const kpis =
    '<div class="kpis">'+
      kpiCard('Win Rate', noTrades?'—':((o.win_rate_pct==null?'—':Number(o.win_rate_pct).toFixed(0)+'%')), '', (b.closed.count||0)+' closed'+(b.open_count?(' · '+b.open_count+' open'):''))+
      kpiCard('Realized P/L %', noTrades?'—':fmtPct(o.total_pnl_pct), signCls(o.total_pnl_pct))+
      kpiCard('Realized P/L $', noTrades?'—':((o.total_pnl_dollars>=0?'+':'')+fmtMoney(o.total_pnl_dollars)), signCls(o.total_pnl_dollars))+
      kpiCard('Reward / Risk', noTrades?'—':(o.reward_risk_ratio==null?'—':Number(o.reward_risk_ratio).toFixed(2)), '', 'avg win / avg loss')+
    '</div>';

  const caveat = lowSample ? '<div class="footnote">⚠ small sample ('+b.closed.count+' trade'+(b.closed.count===1?'':'s')+') — not yet meaningful</div>' : '';

  const positions = (DATA.open_positions||[]).filter(p => p.book_key === b.book_key); const closedRows = (DATA.closed_trades||[]).filter(p => p.book_key === b.book_key && p.research_valid !== false).sort(function(x,y){return new Date(y.exit_time||0) - new Date(x.exit_time||0);}); const dataIssueRows = (DATA.closed_trades||[]).filter(p => p.book_key === b.book_key && p.research_valid === false); window.__openRows = positions; window.__closedRows = closedRows;
  let posPanel = '<div class="panel"><h2>Open Positions ('+positions.length+')</h2>';
  if(!positions.length) posPanel += '<div class="zero-text" style="font-size:13px;color:var(--ink-soft)">No open positions.</div>';
  else posPanel += positions.map(function(p,i){
      var overdue=p.exit_rule==='hold_24hr'&&nonWeekendHours(p.entry_time)>=24;
      var pct=Number(p.unrealized_pnl_percent||0);
      var nowv=Number(p.stake_amount||0)+Number(p.unrealized_pnl_dollars||0);
      var pctStr='<span class="'+signCls(pct)+'" style="font-weight:700">'+(pct>=0?'+':'')+(pct*100).toFixed(2)+'%</span>';
      return '<div class="pos-row trade-clk" role="button" tabindex="0" data-rt="open" data-ri="'+i+'">'
        +'<div class="asset">'+esc(p.asset)+' <span class="badge '+(p.direction==='SHORT'?'short':'long')+'">'+p.direction+'</span>'+(overdue?' <span class="badge short">⚠ OVERDUE</span>':'')+'</div>'
        +'<div class="pos-meta">'+fmtNum(p.shares)+' @ '+fmtPrice(p.entry_price)+' · spent '+fmtMoney(p.stake_amount)+' · now '+fmtMoney(nowv)+' · '+pctStr+'<span class="chev">›</span></div></div>';
    }).join('');
  posPanel += '</div>';

  var isEOD = (b.book_key||'').indexOf('sell_eod') !== -1;
      var closedTitle = isEOD ? 'Closed Positions' : 'Closed Trades';
      let closedPanel = '<div class="panel"><h2>'+closedTitle+' ('+closedRows.length+')</h2>';
      
    if(!closedRows.length) closedPanel += '<div class="zero-text">No closed trades in this book.</div>';
    else closedPanel += closedRows.map(function(p,i){return '<div class="pos-row trade-clk" role="button" tabindex="0" data-rt="closed" data-ri="'+i+'"><div class="asset">'+esc(p.asset)+' <span class="badge '+(p.direction==='SHORT'?'short':'long')+'">'+p.direction+'</span></div>'+'<div class="pos-meta"><span class="'+signCls(p.pnl_dollars)+'">'+(p.pnl_dollars>=0?'+':'')+fmtMoney(p.pnl_dollars)+'</span> · '+(p.pnl_percent>=0?'+':'')+(p.pnl_percent*100).toFixed(2)+'%'+'<span class="chev">›</span></div></div>';}).join('');
    closedPanel += '</div>';
    var dataPanel = '';
    if(dataIssueRows.length){
      dataPanel = '<div class="panel"><h2>Data issues ('+dataIssueRows.length+')</h2><div class="zero-text" style="font-size:12px;color:var(--ink-soft);margin-bottom:8px">Legacy/unverified closes — excluded from win rate & P/L stats.</div>'+dataIssueRows.map(function(p){return '<div class="pos-row"><div class="asset">'+esc(p.asset)+' <span class="badge '+(p.direction==='SHORT'?'short':'long')+'">'+p.direction+'</span></div><div class="pos-meta">'+esc(prettyReason(p.exit_reason))+' · '+(p.pnl_percent>=0?'+':'')+(Number(p.pnl_percent||0)*100).toFixed(2)+'%</div></div>';}).join('')+'</div>';
    }
    var eodNote = '';
  const grid =
    '<div class="grid">'+
      eodNote+
      posPanel+
      closedPanel+
      dataPanel+
      groupPanel('By Asset', a.BY_ASSET, [{k:'win_rate_pct',lab:'win',fmt:'wr'},{k:'total_pnl_pct',lab:'p/l %',fmt:'pct',sign:1}])+
      groupPanel('By Direction', a.BY_DIRECTION, [{k:'win_rate_pct',lab:'win',fmt:'wr'},{k:'avg_win_pct',lab:'avg win',fmt:'pct',sign:1}])+
      groupPanel('By Source', a.BY_SOURCE, [{k:'win_rate_pct',lab:'win',fmt:'wr'},{k:'avg_pnl_pct',lab:'avg p/l',fmt:'pct',sign:1}])+
      groupPanel('By Confidence', a.BY_CONFIDENCE, [{k:'win_rate_pct',lab:'win',fmt:'wr'},{k:'avg_pnl_pct',lab:'avg p/l',fmt:'pct',sign:1}])+
      groupPanel('By Exit Reason', a.BY_EXIT_REASON, [{k:'count',lab:'n'},{k:'avg_pnl_pct',lab:'avg p/l',fmt:'pct',sign:1}])+
      groupPanel('By Hour', a.BY_HOUR, [{k:'win_rate_pct',lab:'win',fmt:'wr'},{k:'avg_pnl_pct',lab:'avg p/l',fmt:'pct',sign:1}])+
    '</div>';

  const ht = a.AVG_HOLD_TIME || {};
  const holdPanel = noTrades ? '' :
    '<div class="grid"><div class="panel"><h2>Avg Hold Time</h2>'+
      '<div class="row"><div class="name">Overall</div><div class="metrics"><div class="metric"><div class="m-val">'+minsLabel(ht.avg_minutes)+'</div><div class="m-lab">avg</div></div></div></div>'+
      '<div class="row"><div class="name">Winners</div><div class="metrics"><div class="metric"><div class="m-val pos-text">'+minsLabel(ht.avg_win_minutes)+'</div><div class="m-lab">avg</div></div></div></div>'+
      '<div class="row"><div class="name">Losers</div><div class="metrics"><div class="metric"><div class="m-val neg-text">'+minsLabel(ht.avg_loss_minutes)+'</div><div class="m-lab">avg</div></div></div></div>'+
    '</div></div>';

  c.innerHTML = eq + kpis + caveat + grid + holdPanel;
    c.querySelectorAll('.trade-clk').forEach(function(el){
      var open = function(){
        var rt = el.getAttribute('data-rt'); var ri = parseInt(el.getAttribute('data-ri'),10);
        var arr = rt==='open' ? window.__openRows : window.__closedRows;
        if(arr && arr[ri]) openTradeModal(arr[ri], rt, ri);
      };
      el.addEventListener('click', open);
      el.addEventListener('keydown', function(e){ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); open(); } });
    });
}

function buildPills(){
  const tg=document.getElementById('portfolio-toggle');
  tg.innerHTML = (DATA.strategies||Object.keys(STRAT_LABELS)).filter(s=>s!=='strict').map(s=>
    '<button class="toggle-btn'+(s===sel.strategy?' on':'')+'" data-strat="'+s+'">'+STRAT_LABELS[s]+'</button>'
  ).join('');
  tg.querySelectorAll('button').forEach(btn=>btn.addEventListener('click',()=>{ sel.strategy=btn.dataset.strat; localStorage.setItem('dash_strategy',sel.strategy); render(); }));
}

function wireSwitch(){
  document.querySelectorAll('#exit-switch button').forEach(btn=>btn.addEventListener('click',()=>{ sel.rule=btn.dataset.rule; localStorage.setItem('dash_rule',sel.rule); render(); }));
}

function setUpdated(){
  const d=DATA&&DATA.generated_at?new Date(DATA.generated_at):new Date();
  var el=document.getElementById('upd-date');
  el.textContent = d.toLocaleString();
  if(isStale()){ el.innerHTML += ' <span style="color:var(--red);font-weight:700">⚠ data &gt;40m old</span>'; }
}

async function loadData(){
  try{
    const r=await fetch('data.json?t='+Date.now(),{cache:'no-store'});
    DATA=await r.json();
    if(!DATA.strategies) DATA.strategies=Object.keys(STRAT_LABELS);
    if(sel.strategy==='strict'){ sel.strategy='news_only'; localStorage.setItem('dash_strategy','news_only'); }
    buildPills(); setUpdated(); render();
  }catch(e){
    document.getElementById('content').innerHTML='<div class="status err">Could not load data.json — '+esc(e.message)+'</div>';
  }finally{  }
}

let touchStartY=0, pulling=false;
window.addEventListener('touchstart',e=>{ if(window.scrollY===0){ touchStartY=e.touches[0].clientY; pulling=true; } },{passive:true});
window.addEventListener('touchmove',e=>{ if(!pulling) return; const dy=e.touches[0].clientY-touchStartY; const h=document.getElementById('ptr-hint'); if(dy>40&&window.scrollY===0) h.classList.add('show'); else h.classList.remove('show'); },{passive:true});
window.addEventListener('touchend',e=>{ const h=document.getElementById('ptr-hint'); if(pulling&&h.classList.contains('show')){ h.classList.remove('show'); loadData(); } pulling=false; },{passive:true});

wireSwitch();
loadData();


// ===== Trade detail modal =====
function tmFmtET(iso){ if(!iso) return '—'; try{ var d=new Date(iso); return d.toLocaleString('en-US',{timeZone:'America/New_York',month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'})+' ET'; }catch(e){ return String(iso); } }
function tmDuration(a,b){ if(!a) return '—'; var end=b?new Date(b):new Date(); var ms=end-new Date(a); if(!isFinite(ms)||ms<0) return '—'; var mins=Math.floor(ms/60000); var d=Math.floor(mins/1440); var hrs=Math.floor((mins%1440)/60); var m=mins%60; var parts=[]; if(d) parts.push(d+'d'); parts.push(hrs+'h'); parts.push(m+'m'); return parts.join(' '); }
function tmRow(k,v){ return '<div class="tm-kv"><span class="k">'+k+'</span><span class="v">'+v+'</span></div>'; }
function prettyReason(r){ var m={take_profit:'Take profit',stop_loss:'Stop loss',time:'24h time exit',early_exit_stock_threshold:'Early exit (+1% gate)',early_exit_crypto_threshold:'Early exit (+2% gate)',eod:'Legacy EOD (unverified)',target:'Take profit',stop:'Stop loss'}; return m[r]||(r||'—'); }
function openTradeModal(t, rt, ri){
  window.__tmTrade = t;
  if(rt!=null) window.__curRt = rt; if(ri!=null) window.__curRi = ri;
  var isOpen = String(t.status).toUpperCase()==='OPEN';
  var dirCls = t.direction==='SHORT'?'short':'long';
  var pnlPctDisp = (t.pnl_percent==null)?null:(t.pnl_percent*100);
  var head = '<div class="tm-head"><div><h3>'+esc(t.asset)+'<span class="tm-badge '+dirCls+'">'+esc(t.direction)+'</span><span class="tm-badge '+(isOpen?'open':'closed')+'">'+esc(t.status)+'</span></h3><div class="tm-sub">'+esc((t.portfolio||'')+' · '+(t.exit_rule||''))+'</div></div><button class="tm-close" onclick="closeTradeModal()">×</button></div>';
  var entryCol = '<div class="tm-col"><h4>Entry</h4>'+tmRow('Price', fmtPrice(t.entry_price))+tmRow('Date / Time', tmFmtET(t.entry_time))+tmRow('Capital', fmtMoney(t.stake_amount))+tmRow('Shares', fmtNum(t.shares))+'</div>';
  var rightCol;
  if(isOpen){
    rightCol = '<div class="tm-col"><h4>Current (Open)</h4>'+tmRow('Last price', t.current_price==null?'—':fmtPrice(t.current_price))+tmRow('Price updated', tmFmtET(t.current_price_at))+tmRow('Held', tmDuration(t.entry_time,null))+tmRow('Exit rule', esc(t.exit_rule||'—'))+'</div>';
  } else {
    rightCol = '<div class="tm-col"><h4>Exit</h4>'+tmRow('Price', fmtPrice(t.exit_price))+tmRow('Date / Time', tmFmtET(t.exit_time))+tmRow('Reason', prettyReason(t.exit_reason)+(t.exit_reason?' <span style="color:var(--ink-soft);font-size:11px">('+esc(t.exit_reason)+')</span>':''))+tmRow('Held', tmDuration(t.entry_time,t.exit_time))+'</div>';
  }
  var banner='';
  if(!isOpen){
    var cls = (t.pnl_dollars>0)?'pos-text':((t.pnl_dollars<0)?'neg-text':'flat');
    var sign = (t.pnl_dollars>=0)?'+':'';
    banner = '<div class="tm-pnl-banner '+cls+'">'+sign+fmtMoney(t.pnl_dollars)+'<div class="sub">'+sign+(pnlPctDisp==null?'—':pnlPctDisp.toFixed(2)+'%')+' realized P&L</div></div>';
  } else {
    var usign=(Number(t.unrealized_pnl_dollars||0)>=0)?'+':'';
    banner = '<div class="tm-pnl-banner '+signCls(t.unrealized_pnl_dollars)+'">'+usign+fmtMoney(t.unrealized_pnl_dollars)+'<div class="sub">'+usign+Number((t.unrealized_pnl_percent||0)*100).toFixed(2)+'% unrealized P&L</div></div>';
  }
  // ----- targets + lifecycle (added 2026-06-09) -----
  var ts = tpSlPrices(t);
  var lifecycle = '<div class="tm-context" style="margin-top:16px"><h4 style="margin:0 0 8px;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted,#999)">Targets &amp; lifecycle ('+ts.cls+')</h4>';
  // Max favorable / adverse excursion during the hold (from published period_high/low)
  if(t.period_high!=null && t.period_low!=null && t.entry_price){
    var ph=Number(t.period_high), pl=Number(t.period_low), ep=Number(t.entry_price);
    var sh=(String(t.direction||'').toUpperCase()==='SHORT'||String(t.direction||'').toUpperCase()==='SELL');
    var mfe=sh?(ep-pl)/ep:(ph-ep)/ep, mae=sh?(ep-ph)/ep:(pl-ep)/ep;
    lifecycle += tmRow('Max run-up', '<span class="pos-text">+'+(mfe*100).toFixed(2)+'%</span> @ '+fmtPrice(sh?pl:ph));
    lifecycle += tmRow('Max drawdown', '<span class="neg-text">'+(mae*100).toFixed(2)+'%</span> @ '+fmtPrice(sh?ph:pl));
  }
  if((t.exit_rule||'')==='hold_24hr'){
    // 24hr Hold: TP/SL + time exit apply
    lifecycle += tmRow('Take profit (+'+(ts.r.tp*100).toFixed(0)+'%)', '<span class="pos-text">'+fmtPrice(ts.tp)+'</span>');
    lifecycle += tmRow('Stop loss (−'+(ts.r.sl*100).toFixed(0)+'%)', '<span class="neg-text">'+fmtPrice(ts.sl)+'</span>');
    if(isOpen){
      var elapsed = ts.cls==='crypto' ? (Date.now()-new Date(t.entry_time).getTime())/3600000 : nonWeekendHours(t.entry_time);
      var remaining = 24 - elapsed, exp = holdExpiry(t);
      var cd = remaining<=0 ? '⚠ overdue — closes at next market-hours check' : (Math.floor(remaining)+'h '+Math.round((remaining-Math.floor(remaining))*60)+'m left');
      lifecycle += tmRow('Hold elapsed', elapsed.toFixed(1)+'h / 24h'+(ts.cls==='stock'?' (weekdays only)':''));
      lifecycle += tmRow('Closes on time', exp?tmFmtET(exp.toISOString()):'overdue');
      lifecycle += tmRow('Countdown', '<span class="'+(remaining<=0?'neg-text':'')+'">'+cd+'</span>');
    }
  } else {
    // Early Exit (sell_eod): ONLY the daily profit gate applies — no TP/SL, no time limit
    var thr = ts.r.eod;
    lifecycle += tmRow('Exit type', 'Early Exit — no stop-loss, no time limit');
    lifecycle += tmRow('Profit gate', '≥ +'+(thr*100).toFixed(0)+'% · checked daily '+ts.r.evalLbl);
    if(isOpen){
      var cur = Number(t.unrealized_pnl_percent||0), meets = cur>=thr;
      var prog = Math.max(0, Math.min(100, (cur/thr)*100));
      lifecycle += tmRow('Now', '<span class="'+signCls(cur)+'">'+(cur>=0?'+':'')+(cur*100).toFixed(2)+'%'+(meets?' ✓ would close':'')+'</span>');
      lifecycle += '<div style="height:8px;background:var(--bg);border-radius:5px;overflow:hidden;margin:8px 0 6px"><span style="display:block;height:100%;width:'+prog+'%;background:'+(meets?'var(--green)':'var(--accent)')+'"></span></div>';
      lifecycle += '<div style="font-size:11px;color:var(--ink-soft);line-height:1.4">Stays open until it closes at the gate (or you close it manually). It will <strong>not</strong> stop out on a loss or time — by design.</div>';
    }
  }
  lifecycle += '</div>';
  var ctx = '<div class="tm-context">'+tmRow('Book', esc(t.book_key||'—'))+tmRow('Source', esc(t.source||'—'))+tmRow('Confidence', (t.confidence==null?'—':t.confidence))+(t.rule_version?tmRow('Rule version', esc(t.rule_version)):'')+(t.title?('<div class="hl">“'+esc(t.title)+'”</div>'):'')+'</div>';
  var navArr = (window.__curRt==='open'?window.__openRows:window.__closedRows)||[]; var ci=window.__curRi;
  var prevDis = (ci>0)?'':'disabled'; var nextDis = (ci>=0 && ci<navArr.length-1)?'':'disabled';
  var foot = '<div class="tm-foot"><button class="tm-btn" '+prevDis+' onclick="tmNav(-1)">‹ Prev</button><button class="tm-btn" id="tm-copy" onclick="tmCopy()">Copy</button><button class="tm-btn" '+nextDis+' onclick="tmNav(1)">Next ›</button><button class="tm-btn" onclick="closeTradeModal()">Close</button></div>';
  document.getElementById('tm-modal').innerHTML = head + '<div class="tm-body"><div class="tm-cols">'+entryCol+rightCol+'</div>'+banner+lifecycle+ctx+'</div>'+foot;
  document.getElementById('tm-overlay').classList.add('open');
}
function closeTradeModal(){ document.getElementById('tm-overlay').classList.remove('open'); }
function tmCopy(){ try{ var t=window.__tmTrade; navigator.clipboard.writeText(JSON.stringify(t,null,2)); var b=document.getElementById('tm-copy'); var o=b.textContent; b.textContent='Copied ✓'; b.classList.add('copied'); setTimeout(function(){b.textContent=o;b.classList.remove('copied');},1400);}catch(e){} }
function tmNav(d){ var arr=(window.__curRt==='open'?window.__openRows:window.__closedRows)||[]; var ni=(window.__curRi==null?0:window.__curRi)+d; if(arr[ni]) openTradeModal(arr[ni], window.__curRt, ni); }
document.addEventListener('keydown',function(e){
  var ov=document.getElementById('tm-overlay'); var open=ov&&ov.classList.contains('open');
  if(e.key==='Escape') closeTradeModal();
  if(open && e.key==='ArrowLeft') tmNav(-1);
  if(open && e.key==='ArrowRight') tmNav(1);
});
</script>
