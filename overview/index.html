<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Analyst — Overview</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Spline+Sans+Mono:wght@400;500;600&family=Spline+Sans:wght@400;500;600;700&display=swap');
  :root {
    --bg: #f4f3ee; --panel: #ffffff; --ink: #1a1d1a; --ink-soft: #6b7269;
    --line: #e4e2d8; --green: #1d9d6b; --green-bg: #e6f5ee; --red: #d6485a;
    --red-bg: #fbeaec; --accent: #3a5a78; --accent-bg: #eaf0f5; --gold: #c08a2d;
    --shadow: 0 1px 2px rgba(26,29,26,.04), 0 8px 24px rgba(26,29,26,.05);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Spline Sans', sans-serif; background: var(--bg); color: var(--ink);
    padding: 32px 24px 60px; min-height: 100vh;
    background-image: radial-gradient(circle at 1px 1px, rgba(26,29,26,.025) 1px, transparent 0);
    background-size: 22px 22px;
  }
  .wrap { max-width: 1080px; margin: 0 auto; }

  .site-nav{display:flex;gap:6px;padding:6px;background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);margin-bottom:24px;justify-content:center;}
  .nav-link{font-family:'Spline Sans',sans-serif;font-size:13px;font-weight:600;color:var(--ink-soft);background:transparent;text-decoration:none;border-radius:12px;padding:10px 20px;transition:all .15s ease;}
  .nav-link:hover{color:var(--ink);}
  .nav-link.on{background:var(--accent);color:#fff;}

  header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 28px; flex-wrap: wrap; gap: 16px; }
  .title-block h1 { font-family: 'Fraunces', serif; font-size: 34px; font-weight: 600; letter-spacing: -.5px; display: flex; align-items: center; gap: 12px; }
  .title-block .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 4px var(--green-bg); animation: pulse 2.4s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .title-block p { color: var(--ink-soft); font-size: 13px; margin-top: 4px; font-family: 'Spline Sans Mono', monospace; }
  .updated { text-align: right; font-size: 12px; color: var(--ink-soft); font-family: 'Spline Sans Mono', monospace; }
  .updated strong { color: var(--ink); display: block; font-size: 13px; }

  .hero { display: grid; grid-template-columns: 1.35fr .65fr; gap: 16px; margin-bottom: 16px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 16px; padding: 24px; box-shadow: var(--shadow); }
  .eyebrow { font-family: 'Spline Sans Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--ink-soft); font-weight: 600; }
  .big { font-family: 'Fraunces', serif; font-size: clamp(32px, 5vw, 54px); font-weight: 600; margin: 10px 0 4px; letter-spacing: -1px; line-height: 1.05; }
  .pos-text { color: var(--green); } .neg-text { color: var(--red); } .zero-text { color: var(--ink-soft); }
  .pill { display: inline-flex; padding: 5px 10px; border-radius: 20px; background: var(--green-bg); color: var(--green); font-weight: 700; font-size: 11px; font-family: 'Spline Sans Mono', monospace; }
  .pill.amber { background: #fef3c7; color: #92400e; }
  .today-val { font-family: 'Fraunces', serif; font-size: 32px; font-weight: 600; margin: 10px 0 4px; }
  .sub { color: var(--ink-soft); font-size: 12px; font-family: 'Spline Sans Mono', monospace; margin-top: 6px; }
  .note { background: #fbf6e8; border: 1px solid #ead8a4; color: #8a6927; padding: 12px; border-radius: 12px; font-size: 11px; line-height: 1.55; margin-top: 12px; font-family: 'Spline Sans Mono', monospace; }

  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 16px; }
  .metric { background: var(--panel); border: 1px solid var(--line); border-radius: 16px; padding: 20px 22px; box-shadow: var(--shadow); }
  .metric .value { font-family: 'Fraunces', serif; font-size: clamp(22px, 3.5vw, 31px); font-weight: 600; margin: 8px 0 4px; letter-spacing: -0.5px; }
  .metric .sub { font-size: 11px; }

  .section-title { font-family: 'Spline Sans Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--ink-soft); font-weight: 600; margin: 28px 0 14px; display: flex; align-items: center; gap: 8px; }
  .section-title::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }
  .leader { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .rank { position: relative; overflow: hidden; }
  .rank::before { content: ''; position: absolute; inset: 0 auto 0 0; width: 4px; background: var(--green); }
  .rank:nth-child(2)::before { background: var(--accent); }
  .rank:nth-child(3)::before { background: var(--gold); }
  .rank-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .rank h3 { font-size: 14px; font-weight: 600; margin: 0; }
  .rank-num { font-family: 'Spline Sans Mono', monospace; font-size: 12px; color: var(--ink-soft); }
  .rank .return { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 600; margin: 12px 0 8px; }
  .bar { height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
  .bar span { display: block; height: 100%; border-radius: 3px; background: var(--green); }
  .rank-foot { display: flex; justify-content: space-between; font-size: 11px; color: var(--ink-soft); margin-top: 10px; font-family: 'Spline Sans Mono', monospace; }
  .tag { font-family: 'Spline Sans Mono', monospace; font-size: 10px; background: var(--accent-bg); color: var(--accent); padding: 2px 7px; border-radius: 5px; font-weight: 600; }
  .tag.vol { background: #f3eefe; color: #6d28d9; }

  .health-row { display: flex; align-items: center; gap: 8px; margin-top: 14px; font-size: 12px; color: var(--ink-soft); font-family: 'Spline Sans Mono', monospace; }
  .health-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  .health-dot.warn { background: var(--gold); }
  .health-dot.err { background: var(--red); }

  /* chart */
  .chart-card { margin-bottom: 16px; }
  .chart-top { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }
  .chart-top h2 { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600; margin: 0; }
  .controls { display: flex; gap: 6px; }
  .controls button { background: var(--panel); border: 1px solid var(--line); padding: 7px 12px; border-radius: 10px; font: 600 11px 'Spline Sans Mono', monospace; color: var(--ink-soft); cursor: pointer; }
  .controls .on { border-color: var(--green); color: var(--green); background: var(--green-bg); }
  .legend { display: flex; gap: 18px; font-size: 11px; color: var(--ink-soft); font-family: 'Spline Sans Mono', monospace; margin-bottom: 14px; }
  .legend span::before { content: ''; display: inline-block; width: 16px; height: 3px; border-radius: 2px; margin-right: 6px; vertical-align: middle; background: var(--green); }
  .legend .ref::before { background: var(--gold); border-top: 1px dashed var(--gold); }
  .chart-area { height: 240px; position: relative; border-left: 1px solid var(--line); border-bottom: 1px solid var(--line); background: repeating-linear-gradient(to bottom, transparent 0, transparent 59px, var(--line) 60px); border-radius: 0 0 8px 0; }
  .chart-area svg { width: 100%; height: 100%; overflow: visible; }
  .chart-labels { display: flex; justify-content: space-between; color: var(--ink-soft); font-size: 10px; margin-top: 8px; font-family: 'Spline Sans Mono', monospace; }
  .chart-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--ink-soft); font-family: 'Spline Sans Mono', monospace; font-size: 13px; text-align: center; padding: 20px; }

  /* filter pills */
  .filter-row { display: flex; gap: 6px; padding: 6px; background: var(--panel); border: 1px solid var(--line); border-radius: 14px; box-shadow: var(--shadow); margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
  .filter-btn { border: 0; background: transparent; padding: 9px 14px; border-radius: 10px; font: 600 12px 'Spline Sans', sans-serif; color: var(--ink-soft); cursor: pointer; }
  .filter-btn.on { background: var(--accent); color: #fff; }
  .filter-btn.lab-filter { color: #92400e; }
  .filter-btn.lab-filter.on { background: #f59e0b; color: #fff; }

  .lower { display: grid; grid-template-columns: 1.2fr .8fr; gap: 16px; margin-top: 16px; }
  .book-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--line); }
  .book-row:last-child { border-bottom: none; }
  .book-row .name { font-weight: 600; font-size: 13px; }
  .book-row .name small { display: block; font-size: 11px; color: var(--ink-soft); font-weight: 400; }
  .book-row .spark { font-family: 'Spline Sans Mono', monospace; font-weight: 600; font-size: 14px; }

  .day-row { display: grid; grid-template-columns: 90px 1fr 90px 90px; gap: 10px; align-items: center; padding: 11px 0; border-bottom: 1px solid var(--line); font-size: 12px; font-family: 'Spline Sans Mono', monospace; }
  .day-row:last-child { border-bottom: none; }
  .day-bar { height: 8px; background: var(--bg); border-radius: 6px; overflow: hidden; }
  .day-bar i { display: block; height: 100%; background: linear-gradient(90deg, var(--green), #8fc35d); border-radius: 6px; }
  .day-bar i.neg { background: var(--red); }

  .footnote { margin-top: 22px; padding: 14px 18px; background: var(--accent-bg); border-radius: 12px; font-size: 12px; color: var(--accent); line-height: 1.55; border-left: 3px solid var(--accent); font-family: 'Spline Sans Mono', monospace; }
  .status { text-align: center; padding: 40px; color: var(--ink-soft); font-family: 'Spline Sans Mono', monospace; font-size: 13px; }
  .status.err { color: var(--red); }

  @media (max-width: 720px) {
    .hero { grid-template-columns: 1fr; }
    .metrics { grid-template-columns: 1fr 1fr; }
    .leader { grid-template-columns: 1fr; }
    .lower { grid-template-columns: 1fr; }
    header { flex-direction: column; align-items: flex-start; }
    .updated { text-align: left; }
    .chart-area { height: 200px; }
    .day-row { grid-template-columns: 70px 1fr 70px; }
    .day-row .equity { display: none; }
  }
  @media(max-width:640px){
    .site-nav{position:fixed;bottom:0;left:0;right:0;border-radius:0;z-index:100;margin:0;border-left:0;border-right:0;border-bottom:0;background:var(--panel);box-shadow:0 -2px 10px rgba(0,0,0,.08);}
    body{padding-bottom:70px !important;}
  }
</style>
</head>
<body>
<div class="wrap">
  <nav class="site-nav">
    <a href="../overview/" class="nav-link on">Overview</a>
    <a href="../research/" class="nav-link">Research</a>
    <a href="../operations/" class="nav-link">Operations</a>
  </nav>

  <header>
    <div class="title-block">
      <h1><span class="dot"></span>Research Growth</h1>
      <p>How the complete experiment is growing over time</p>
    </div>
    <div class="updated" id="started-block">
      <span>Last updated</span>
      <strong id="upd-date">—</strong>
    </div>
  </header>

  <div id="content">
    <div class="status">Loading…</div>
  </div>
</div>

<script>
var DATA_URL = '../data.json?t=' + Date.now();
var STRAT_LABELS = { news_only:'News Only', news_plus_ta:'Trend Gate', mean_reversion:'Mean Revert', trend_strict:'Trend Strict', strict:'Full Confluence', crypto_lab:'Crypto Lab' };
var RULE_LABEL = { hold_24hr:'24hr Hold', sell_eod:'Early Exit' };
var fmtMoney = function(n) { return '$' + Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); };
var fmtPct = function(n) { return (n>0?'+':'') + Number(n||0).toFixed(2) + '%'; };
var signCls = function(n) { return n>0?'pos-text':(n<0?'neg-text':'zero-text'); };
var esc = function(s) { return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); };

var DATA = null;
var activeFilter = 'production';

function classifyBook(b) {
  if (b.portfolio === 'crypto_lab') return 'lab';
  if (b.target_model === 'volatility') return 'pilot';
  return 'production';
}

async function loadData() {
  try {
    var r = await fetch(DATA_URL, {cache:'no-store'});
    DATA = await r.json();
    var d = DATA.generated_at ? new Date(DATA.generated_at) : new Date();
    document.getElementById('upd-date').textContent = d.toLocaleString();
    render();
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="status err">Could not load data.json — '+esc(e.message)+'</div>';
  }
}

function setFilter(f) {
  activeFilter = f;
  render();
}

function render() {
  var D = DATA;
  if (!D) return;
  var books = D.books || [];
  var openPos = D.open_positions || [];
  var closedTrades = D.closed_trades || [];
  var snapshots = D.snapshots || [];
  var config = D.config || {};
  var experimentStart = config.experiment_start || null;

  var prodBooks = books.filter(function(b){ return classifyBook(b) === 'production'; });
  var pilotBooks = books.filter(function(b){ return classifyBook(b) === 'pilot'; });
  var labBooks = books.filter(function(b){ return classifyBook(b) === 'lab'; });

  var viewBooks, viewLabel, viewFilter;
  if (activeFilter === 'production') {
    viewBooks = prodBooks; viewLabel = 'Primary Experiment'; viewFilter = 'production';
  } else if (activeFilter === 'pilot') {
    viewBooks = pilotBooks; viewLabel = 'Volatility Pilot'; viewFilter = 'pilot';
  } else if (activeFilter === 'lab') {
    viewBooks = labBooks; viewLabel = 'Crypto Lab'; viewFilter = 'lab';
  } else {
    viewBooks = books; viewLabel = 'All Research Books'; viewFilter = 'all';
  }

  var viewEquity = viewBooks.reduce(function(s,b){ return s + Number(b.total_equity||0); }, 0);
  var viewStarting = viewBooks.reduce(function(s,b){ return s + Number(b.starting_balance||0); }, 0);
  var viewGain = viewEquity - viewStarting;
  var viewReturn = viewStarting > 0 ? (viewGain / viewStarting) * 100 : 0;

  var viewOpen = openPos.filter(function(p) {
    var cls = classifyBook({portfolio:p.portfolio, target_model:p.target_model});
    return viewFilter === 'all' || cls === viewFilter;
  });
  var viewClosed = closedTrades.filter(function(c) {
    if (c.research_valid === false) return false;
    var cls = classifyBook({portfolio:c.portfolio, target_model:c.target_model});
    return viewFilter === 'all' || cls === viewFilter;
  });
  var realizedPnl = viewClosed.reduce(function(s,c){ return s + Number(c.pnl_dollars||0); }, 0);
  var unrealizedPnl = viewOpen.reduce(function(s,p){ return s + Number(p.unrealized_pnl_dollars||0); }, 0);

  // Filter snapshots by current view
  var viewSnapKey = activeFilter === 'all' ? 'all' : activeFilter;
  var viewSnaps = snapshots.filter(function(s){ return s[viewSnapKey]; }).map(function(s){
    return { date: s.date, equity: Number(s[viewSnapKey].equity), starting: Number(s[viewSnapKey].starting), realized: Number(s[viewSnapKey].realized), unrealized: Number(s[viewSnapKey].unrealized) };
  });
  viewSnaps.sort(function(a,b){ return a.date.localeCompare(b.date); });

  var todayStr = new Date().toLocaleDateString('en-CA', {timeZone:'America/New_York'});
  var todaySnap = viewSnaps.length > 0 ? viewSnaps[viewSnaps.length - 1] : null;
  var yesterdaySnap = viewSnaps.length > 1 ? viewSnaps[viewSnaps.length - 2] : null;
  var todayChange = null;
  if (todaySnap && todaySnap.date === todayStr) {
    todayChange = yesterdaySnap ? todaySnap.equity - yesterdaySnap.equity : todaySnap.equity - todaySnap.starting;
  }

  var health = D.health || {};
  var healthStatus = health.status || 'unknown';
  var healthDotCls = healthStatus === 'healthy' ? '' : (healthStatus === 'degraded' ? ' warn' : ' err');
  var healthLabel = healthStatus === 'healthy' ? 'System operational' : (healthStatus === 'degraded' ? 'System degraded' : (healthStatus === 'error' ? 'System error' : 'Health unknown'));

  var isLab = activeFilter === 'lab';
  var isAll = activeFilter === 'all';

  var filterHtml =
    '<div class="filter-row">' +
      '<button class="filter-btn'+(activeFilter==='production'?' on':'')+'" onclick="setFilter(\'production\')">Primary Experiment</button>' +
      '<button class="filter-btn'+(activeFilter==='pilot'?' on':'')+'" onclick="setFilter(\'pilot\')">Volatility Pilot</button>' +
      '<button class="filter-btn lab-filter'+(activeFilter==='lab'?' on':'')+'" onclick="setFilter(\'lab\')">Crypto Lab</button>' +
      '<button class="filter-btn'+(activeFilter==='all'?' on':'')+'" onclick="setFilter(\'all\')">All Research Books</button>' +
    '</div>';

  var startHtml = '';
  if (experimentStart) {
    var startDate = new Date(experimentStart);
    var dayCount = Math.floor((Date.now() - startDate.getTime()) / 86400000);
    startHtml = '<div class="sub" style="margin-top:8px">Experiment started <strong>' +
      startDate.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}) +
      '</strong> · Day ' + dayCount + '</div>';
  }

  var allNote = isAll ? '<div class="note" style="margin-top:10px"><strong>Combined view.</strong> This shows all research books together. Books are independent paper accounts — this is not one combined brokerage.</div>' : '';
  var labNote = isLab ? '<div class="note" style="margin-top:10px;border-color:#f59e0b;background:#fffbeb;color:#92400e"><strong>Crypto Lab — experimental.</strong> These results are not blended into the Primary Experiment totals.</div>' : '';

  var heroHtml =
    '<section class="hero">' +
      '<div class="card">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">' +
          '<span class="eyebrow">' + esc(viewLabel) + ' · ' + viewBooks.length + ' books</span>' +
          '<span class="pill' + (isLab ? ' amber' : '') + '">' + viewOpen.length + ' open positions</span>' +
        '</div>' +
        '<div class="big">' + fmtMoney(viewEquity) + '</div>' +
        '<div class="' + signCls(viewGain) + '" style="font-weight:600;font-size:14px">' +
          (viewGain >= 0 ? '+' : '') + fmtMoney(viewGain) + ' · ' + fmtPct(viewReturn) + ' marked return' +
        '</div>' +
        startHtml +
        '<div class="health-row">' +
          '<span class="health-dot' + healthDotCls + '"></span>' +
          healthLabel + ' · ' + books.length + ' total books tracked' +
        '</div>' +
        allNote + labNote +
      '</div>' +
      '<div class="card">' +
        '<div class="eyebrow">Made today</div>' +
        (todayChange !== null
          ? '<div class="today-val ' + signCls(todayChange) + '">' + (todayChange >= 0 ? '+' : '') + fmtMoney(todayChange) + '</div><div class="sub">Since ' + (yesterdaySnap ? 'yesterday\'s close' : 'experiment start') + '</div>'
          : (snapshots.length > 0
            ? '<div class="today-val" style="color:var(--ink-soft)">—</div><div class="sub">Today\'s snapshot not yet captured</div>'
            : '<div class="today-val" style="color:var(--ink-soft)">—</div><div class="sub">Collecting authoritative growth history</div>'
          )
        ) +
        '<div class="note">The daily number resets at midnight ET. It includes today\'s realized and unrealized change.</div>' +
      '</div>' +
    '</section>';

  var metricsHtml =
    '<section class="metrics">' +
      '<div class="metric"><div class="eyebrow">Starting Capital</div><div class="value">' + fmtMoney(viewStarting) + '</div><div class="sub">' + viewBooks.length + ' books × $10,000</div></div>' +
      '<div class="metric"><div class="eyebrow">Realized Profit</div><div class="value ' + signCls(realizedPnl) + '">' + (realizedPnl >= 0 ? '+' : '') + fmtMoney(realizedPnl) + '</div><div class="sub">From closed trades</div></div>' +
      '<div class="metric"><div class="eyebrow">Open-Trade Change</div><div class="value ' + signCls(unrealizedPnl) + '">' + (unrealizedPnl >= 0 ? '+' : '') + fmtMoney(unrealizedPnl) + '</div><div class="sub">' + viewOpen.length + ' open positions</div></div>' +
      (function(){
        if (viewSnaps.length >= 2) {
          var totalGain = viewSnaps[viewSnaps.length-1].equity - viewSnaps[0].starting;
          var avgDaily = totalGain / viewSnaps.length;
          return '<div class="metric"><div class="eyebrow">Average Daily Growth</div><div class="value ' + signCls(avgDaily) + '">' + (avgDaily>=0?'+':'') + fmtMoney(avgDaily) + '</div><div class="sub">Over ' + viewSnaps.length + ' days</div></div>';
        }
        return '<div class="metric"><div class="eyebrow">Average Daily Growth</div><div class="value" style="color:var(--ink-soft)">—</div><div class="sub">' + (viewSnaps.length === 1 ? '1 day captured — need 2+' : 'Requires daily snapshots') + '</div></div>';
      })() +
    '</section>';

  var chartHtml =
    '<section class="card chart-card">' +
      '<div class="chart-top">' +
        '<div><h2>Compounding growth</h2><div class="sub" style="margin-top:4px">Actual marked equity versus the 1%-per-day reference path</div></div>' +
      '</div>' +
      '<div class="legend"><span>Actual system</span><span class="ref">1% daily reference</span></div>' +
      '<div class="chart-area">' +
        (function(){
          if (viewSnaps.length < 2) return '<div class="chart-empty">Collecting authoritative growth history.<br>' + (viewSnaps.length === 1 ? '1 snapshot captured — chart draws at 2+ days.' : 'Chart will populate as daily snapshots accumulate.') + '</div>';
          var W=700, H=220, PL=60, PR=10, PT=15, PB=20;
          var startEq = viewSnaps[0].starting;
          var refPts = viewSnaps.map(function(_,i){ return startEq * Math.pow(1.01, i); });
          var eqVals = viewSnaps.map(function(s){ return s.equity; });
          var allV = eqVals.concat(refPts);
          var yMin = Math.min.apply(null, allV), yMax = Math.max.apply(null, allV);
          var pad = (yMax - yMin) * 0.08 || 200;
          yMin -= pad; yMax += pad;
          function xP(i){ return PL + (i / (viewSnaps.length - 1)) * (W - PL - PR); }
          function yP(v){ return PT + (1 - (v - yMin) / (yMax - yMin)) * (H - PT - PB); }
          var grid = '';
          for (var g = 0; g <= 4; g++) {
            var gy = PT + (g / 4) * (H - PT - PB);
            var gv = yMax - (g / 4) * (yMax - yMin);
            grid += '<line x1="'+PL+'" y1="'+gy.toFixed(1)+'" x2="'+(W-PR)+'" y2="'+gy.toFixed(1)+'" stroke="#e4e2d8" stroke-width="0.5"/>';
            grid += '<text x="'+(PL-6)+'" y="'+(gy+3).toFixed(1)+'" text-anchor="end" font-size="9" fill="#6b7269" font-family="Spline Sans Mono,monospace">$'+Math.round(gv).toLocaleString()+'</text>';
          }
          var refD = refPts.map(function(v,i){ return (i===0?'M':'L')+xP(i).toFixed(1)+','+yP(v).toFixed(1); }).join(' ');
          var actD = eqVals.map(function(v,i){ return (i===0?'M':'L')+xP(i).toFixed(1)+','+yP(v).toFixed(1); }).join(' ');
          var dots = eqVals.map(function(v,i){ return '<circle cx="'+xP(i).toFixed(1)+'" cy="'+yP(v).toFixed(1)+'" r="3.5" fill="#1d9d6b" stroke="#fff" stroke-width="1.5"/>'; }).join('');
          var labels = viewSnaps.map(function(s,i){
            var lbl = s.date.slice(5);
            return '<text x="'+xP(i).toFixed(1)+'" y="'+(H-2)+'" text-anchor="middle" font-size="9" fill="#6b7269" font-family="Spline Sans Mono,monospace">'+lbl+'</text>';
          }).join('');
          return '<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">'+grid+'<path d="'+refD+'" fill="none" stroke="#c08a2d" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.6"/><path d="'+actD+'" fill="none" stroke="#1d9d6b" stroke-width="2.5"/>'+dots+labels+'</svg>';
        })() +
      '</div>' +
      '<div class="note" style="margin-top:12px"><strong>Reference path only</strong> — the 1% line is not a target, promise, or trading instruction. The system must never alter trades or risk-taking to chase this line.</div>' +
    '</section>';

  var sorted = viewBooks.slice().sort(function(a,b){ return Number(b.growth_pct||0) - Number(a.growth_pct||0); });
  var top3 = sorted.slice(0, 3);

  var leaderHtml = '<div class="section-title">Best-performing books</div><div class="leader">';
  top3.forEach(function(b, i) {
    var g = Number(b.growth_pct || 0);
    var maxG = Math.max(Number(top3[0].growth_pct || 1), 0.01);
    var barW = maxG > 0 ? Math.round((Math.max(g, 0) / maxG) * 100) : 0;
    var model = (b.target_model || 'fixed') === 'volatility' ? '<span class="tag vol">Volatility</span>' : '<span class="tag">Fixed</span>';
    var closedCount = closedTrades.filter(function(c){ return c.book_key === b.book_key && c.research_valid !== false; }).length;
    leaderHtml +=
      '<div class="card rank">' +
        '<div class="rank-top"><div><h3>' + esc(STRAT_LABELS[b.portfolio] || b.portfolio || '') + ' · ' + esc(RULE_LABEL[b.exit_rule] || b.exit_rule || '') + '</h3>' + model + '</div><span class="rank-num">#' + (i + 1) + '</span></div>' +
        '<div class="return ' + signCls(g) + '">' + fmtPct(g) + '</div>' +
        '<div class="bar"><span style="width:' + Math.max(barW, 2) + '%"></span></div>' +
        '<div class="rank-foot"><span>' + closedCount + ' closed · ' + (b.open_count || 0) + ' open</span><span>' + fmtMoney(b.total_equity) + '</span></div>' +
      '</div>';
  });
  leaderHtml += '</div>';

  var lowerHtml = '<section class="lower">';

  lowerHtml += '<div class="card"><div class="section-title" style="margin-top:0">Daily results</div>';
  lowerHtml += '<div class="sub" style="margin-bottom:12px">What the experiment gained or lost each day</div>';
  if (viewSnaps.length > 0) {
    var maxAbsChange = 1;
    var dailyRows = viewSnaps.map(function(s, i) {
      var prev = i > 0 ? viewSnaps[i-1].equity : s.starting;
      var change = s.equity - prev;
      var changePct = prev > 0 ? (change / prev) * 100 : 0;
      if (Math.abs(change) > maxAbsChange) maxAbsChange = Math.abs(change);
      return { date: s.date, equity: s.equity, change: change, changePct: changePct };
    });
    lowerHtml += '<div class="day-row" style="font-weight:600;color:var(--ink-soft);border-bottom:2px solid var(--line)"><span>Date</span><span></span><span>Change</span><span class="equity">Equity</span></div>';
    dailyRows.slice().reverse().forEach(function(r) {
      var barW = Math.round((Math.abs(r.change) / maxAbsChange) * 100);
      lowerHtml += '<div class="day-row"><span>' + r.date.slice(5) + '</span><div class="day-bar"><i style="width:'+Math.max(barW,2)+'%"' + (r.change < 0 ? ' class="neg"' : '') + '></i></div><span class="' + signCls(r.change) + '">' + (r.change>=0?'+':'') + fmtMoney(r.change) + '</span><span class="equity">' + fmtMoney(r.equity) + '</span></div>';
    });
  } else {
    lowerHtml += '<div style="padding:30px 0;text-align:center;color:var(--ink-soft);font-family:\'Spline Sans Mono\',monospace;font-size:12px">Collecting authoritative growth history.<br>Daily results will appear as snapshots accumulate.</div>';
  }
  lowerHtml += '</div>';

  lowerHtml += '<div class="card"><div class="section-title" style="margin-top:0">Where growth came from</div>';
  lowerHtml += '<div class="sub" style="margin-bottom:12px">Best contributors since experiment start</div>';
  sorted.forEach(function(b) {
    var g = Number(b.growth_dollars || 0);
    var cls = classifyBook(b);
    var clsTag = cls === 'pilot' ? ' <span class="tag vol" style="font-size:9px">PILOT</span>' : (cls === 'lab' ? ' <span class="tag" style="background:#fef3c7;color:#92400e;font-size:9px">LAB</span>' : '');
    lowerHtml +=
      '<div class="book-row">' +
        '<div class="name">' + esc(STRAT_LABELS[b.portfolio] || b.portfolio || '') + ' · ' + esc(RULE_LABEL[b.exit_rule] || b.exit_rule || '') + clsTag +
          '<small>' + closedTrades.filter(function(c){ return c.book_key === b.book_key && c.research_valid !== false; }).length + ' closed trades</small>' +
        '</div>' +
        '<span class="spark ' + signCls(g) + '">' + (g >= 0 ? '+' : '') + fmtMoney(g) + '</span>' +
      '</div>';
  });
  lowerHtml += '<div class="note" style="margin-top:16px"><strong>Reference paths only.</strong> Any growth comparisons shown are reference lines, not targets, promises, or forecasts. The system must never alter trading behavior to chase a dashboard reference line.</div>';
  lowerHtml += '</div></section>';

  var footnote = '<div class="footnote"><strong>Model:</strong> ' + esc(D.model || '') + '</div>';

  document.getElementById('content').innerHTML = filterHtml + heroHtml + metricsHtml + chartHtml + leaderHtml + lowerHtml + footnote;
}

loadData();
</script>
</body>
</html>
