<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Analyst — Overview</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Spline+Sans+Mono:wght@400;500;600&family=Spline+Sans:wght@400;500;600;700&display=swap');
  :root {
    --bg: #f4f3ee; --panel: #ffffff; --ink: #1a1d1a; --ink-soft: #6b7269;
    --line: #e4e2d8; --green: #1d9d6b; --green-bg: #e6f5ee; --red: #d6485a;
    --red-bg: #fbeaec; --accent: #3a5a78; --accent-bg: #eaf0f5; --gold: #c08a2d;
    --shadow: 0 1px 2px rgba(26,29,26,.04), 0 8px 24px rgba(26,29,26,.05);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Spline Sans', sans-serif; background: var(--bg); color: var(--ink);
    padding: 32px 24px 60px; min-height: 100vh;
    background-image: radial-gradient(circle at 1px 1px, rgba(26,29,26,.025) 1px, transparent 0);
    background-size: 22px 22px;
  }
  .wrap { max-width: 1080px; margin: 0 auto; }

  /* --- shared site navigation --- */
  .site-nav{display:flex;gap:6px;padding:6px;background:var(--panel);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);margin-bottom:24px;justify-content:center;}
  .nav-link{font-family:'Spline Sans',sans-serif;font-size:13px;font-weight:600;color:var(--ink-soft);background:transparent;text-decoration:none;border-radius:12px;padding:10px 20px;transition:all .15s ease;}
  .nav-link:hover{color:var(--ink);}
  .nav-link.on{background:var(--accent);color:#fff;}

  header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 28px; flex-wrap: wrap; gap: 16px; }
  .title-block h1 { font-family: 'Fraunces', serif; font-size: 34px; font-weight: 600; letter-spacing: -.5px; display: flex; align-items: center; gap: 12px; }
  .title-block .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 4px var(--green-bg); animation: pulse 2.4s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .title-block p { color: var(--ink-soft); font-size: 13px; margin-top: 4px; font-family: 'Spline Sans Mono', monospace; }
  .updated { text-align: right; font-size: 12px; color: var(--ink-soft); font-family: 'Spline Sans Mono', monospace; }
  .updated strong { color: var(--ink); display: block; font-size: 13px; }

  /* hero */
  .hero { display: grid; grid-template-columns: 1.35fr .65fr; gap: 16px; margin-bottom: 16px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 16px; padding: 24px; box-shadow: var(--shadow); }
  .eyebrow { font-family: 'Spline Sans Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--ink-soft); font-weight: 600; }
  .big { font-family: 'Fraunces', serif; font-size: clamp(32px, 5vw, 54px); font-weight: 600; margin: 10px 0 4px; letter-spacing: -1px; line-height: 1.05; }
  .pos-text { color: var(--green); } .neg-text { color: var(--red); } .zero-text { color: var(--ink-soft); }
  .pill { display: inline-flex; padding: 5px 10px; border-radius: 20px; background: var(--green-bg); color: var(--green); font-weight: 700; font-size: 11px; font-family: 'Spline Sans Mono', monospace; }
  .today-val { font-family: 'Fraunces', serif; font-size: 32px; font-weight: 600; margin: 10px 0 4px; }
  .sub { color: var(--ink-soft); font-size: 12px; font-family: 'Spline Sans Mono', monospace; margin-top: 6px; }
  .note { background: #fbf6e8; border: 1px solid #ead8a4; color: #8a6927; padding: 12px; border-radius: 12px; font-size: 11px; line-height: 1.55; margin-top: 12px; font-family: 'Spline Sans Mono', monospace; }

  /* metric grid */
  .metrics { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 16px; }
  .metric { background: var(--panel); border: 1px solid var(--line); border-radius: 16px; padding: 20px 22px; box-shadow: var(--shadow); }
  .metric .value { font-family: 'Fraunces', serif; font-size: clamp(22px, 3.5vw, 31px); font-weight: 600; margin: 8px 0 4px; letter-spacing: -0.5px; }
  .metric .sub { font-size: 11px; }

  /* books leaderboard */
  .section-title { font-family: 'Spline Sans Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--ink-soft); font-weight: 600; margin: 28px 0 14px; display: flex; align-items: center; gap: 8px; }
  .section-title::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }
  .leader { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .rank { position: relative; overflow: hidden; }
  .rank::before { content: ''; position: absolute; inset: 0 auto 0 0; width: 4px; background: var(--green); }
  .rank:nth-child(2)::before { background: var(--accent); }
  .rank:nth-child(3)::before { background: var(--gold); }
  .rank-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .rank h3 { font-size: 14px; font-weight: 600; margin: 0; }
  .rank-num { font-family: 'Spline Sans Mono', monospace; font-size: 12px; color: var(--ink-soft); }
  .rank .return { font-family: 'Fraunces', serif; font-size: 26px; font-weight: 600; margin: 12px 0 8px; }
  .bar { height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
  .bar span { display: block; height: 100%; border-radius: 3px; background: var(--green); }
  .rank-foot { display: flex; justify-content: space-between; font-size: 11px; color: var(--ink-soft); margin-top: 10px; font-family: 'Spline Sans Mono', monospace; }
  .tag { font-family: 'Spline Sans Mono', monospace; font-size: 10px; background: var(--accent-bg); color: var(--accent); padding: 2px 7px; border-radius: 5px; font-weight: 600; }
  .tag.vol { background: #f3eefe; color: #6d28d9; }

  /* health */
  .health-row { display: flex; align-items: center; gap: 8px; margin-top: 14px; font-size: 12px; color: var(--ink-soft); font-family: 'Spline Sans Mono', monospace; }
  .health-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
  .health-dot.warn { background: var(--gold); }
  .health-dot.err { background: var(--red); }

  /* lower grid */
  .lower { display: grid; grid-template-columns: 1.2fr .8fr; gap: 16px; margin-top: 16px; }
  .book-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--line); }
  .book-row:last-child { border-bottom: none; }
  .book-row .name { font-weight: 600; font-size: 13px; }
  .book-row .name small { display: block; font-size: 11px; color: var(--ink-soft); font-weight: 400; }
  .book-row .spark { font-family: 'Spline Sans Mono', monospace; font-weight: 600; font-size: 14px; }

  .footnote { margin-top: 22px; padding: 14px 18px; background: var(--accent-bg); border-radius: 12px; font-size: 12px; color: var(--accent); line-height: 1.55; border-left: 3px solid var(--accent); font-family: 'Spline Sans Mono', monospace; }
  .status { text-align: center; padding: 40px; color: var(--ink-soft); font-family: 'Spline Sans Mono', monospace; font-size: 13px; }
  .status.err { color: var(--red); }

  @media (max-width: 720px) {
    .hero { grid-template-columns: 1fr; }
    .metrics { grid-template-columns: 1fr 1fr; }
    .leader { grid-template-columns: 1fr; }
    .lower { grid-template-columns: 1fr; }
    header { flex-direction: column; align-items: flex-start; }
    .updated { text-align: left; }
  }
  @media(max-width:640px){
    .site-nav{position:fixed;bottom:0;left:0;right:0;border-radius:0;z-index:100;margin:0;border-left:0;border-right:0;border-bottom:0;background:var(--panel);box-shadow:0 -2px 10px rgba(0,0,0,.08);}
    body{padding-bottom:70px !important;}
  }
</style>
</head>
<body>
<div class="wrap">
  <nav class="site-nav">
    <a href="../overview/" class="nav-link on">Overview</a>
    <a href="../research/" class="nav-link">Research</a>
    <a href="../operations/" class="nav-link">Operations</a>
  </nav>

  <header>
    <div class="title-block">
      <h1><span class="dot"></span>Trading Analyst</h1>
      <p>How is the experiment doing?</p>
    </div>
    <div class="updated">
      <span>Last updated</span>
      <strong id="upd-date">—</strong>
    </div>
  </header>

  <div id="content">
    <div class="status">Loading…</div>
  </div>
</div>

<script>
const STRAT_LABELS = { news_only:'News Only', news_plus_ta:'Trend Gate', mean_reversion:'Mean Revert', trend_strict:'Trend Strict', strict:'All Signals', crypto_lab:'Crypto Lab' };
const RULE_LABEL = { hold_24hr:'24hr Hold', sell_eod:'Early Exit' };
const fmtMoney = n => '$' + Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtPct = n => (n>0?'+':'') + Number(n||0).toFixed(2) + '%';
const signCls = n => n>0?'pos-text':(n<0?'neg-text':'zero-text');
const esc = s => String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

async function loadData(){
  try {
    const r = await fetch('../data.json?t='+Date.now(), {cache:'no-store'});
    const D = await r.json();
    render(D);
    const d = D.generated_at ? new Date(D.generated_at) : new Date();
    document.getElementById('upd-date').textContent = d.toLocaleString();
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="status err">Could not load data.json — '+esc(e.message)+'</div>';
  }
}

function render(D) {
  const t = D.totals || {};
  const books = D.books || [];
  const openPos = D.open_positions || [];
  const closedTrades = D.closed_trades || [];

  const totalEquity = Number(t.equity || 0);
  const startingCapital = Number(t.starting || 0);
  const totalGain = totalEquity - startingCapital;
  const totalReturn = startingCapital > 0 ? (totalGain / startingCapital) * 100 : 0;

  const realizedPnl = closedTrades.filter(c => c.research_valid !== false).reduce((s, c) => s + Number(c.pnl_dollars || 0), 0);
  const unrealizedPnl = openPos.reduce((s, p) => s + Number(p.unrealized_pnl_dollars || 0), 0);
  const openCount = Number(t.open_positions || openPos.length || 0);
  const bookCount = Number(t.book_count || books.length || 0);

  const sorted = books.slice().sort((a, b) => Number(b.growth_pct || 0) - Number(a.growth_pct || 0));
  const top3 = sorted.slice(0, 3);
  const worst = sorted.slice().reverse().slice(0, 3);

  const heroHtml =
    '<section class="hero">' +
      '<div class="card">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">' +
          '<span class="eyebrow">Total marked equity · ' + bookCount + ' independent books</span>' +
          '<span class="pill">' + openCount + ' open positions</span>' +
        '</div>' +
        '<div class="big">' + fmtMoney(totalEquity) + '</div>' +
        '<div class="' + signCls(totalGain) + '" style="font-weight:600;font-size:14px">' +
          (totalGain >= 0 ? '+' : '') + fmtMoney(totalGain) + ' · ' + fmtPct(totalReturn) + ' combined marked return' +
        '</div>' +
        '<div class="health-row">' +
          '<span class="health-dot"></span>' +
          'System operational · ' + bookCount + ' books tracked' +
        '</div>' +
      '</div>' +
      '<div class="card">' +
        '<div class="eyebrow">Experiment status</div>' +
        '<div class="today-val">' + bookCount + ' books</div>' +
        '<div class="sub">' + fmtMoney(startingCapital) + ' starting capital</div>' +
        '<div class="note">' +
          '<strong>Important:</strong> Total research capital represents multiple independent paper books, not one combined live brokerage account.' +
        '</div>' +
      '</div>' +
    '</section>';

  const metricsHtml =
    '<section class="metrics">' +
      '<div class="metric"><div class="eyebrow">Starting Capital</div><div class="value">' + fmtMoney(startingCapital) + '</div><div class="sub">' + bookCount + ' books × ' + fmtMoney(startingCapital / bookCount) + '</div></div>' +
      '<div class="metric"><div class="eyebrow">Realized P/L</div><div class="value ' + signCls(realizedPnl) + '">' + (realizedPnl >= 0 ? '+' : '') + fmtMoney(realizedPnl) + '</div><div class="sub">From ' + closedTrades.filter(c => c.research_valid !== false).length + ' closed trades</div></div>' +
      '<div class="metric"><div class="eyebrow">Unrealized P/L</div><div class="value ' + signCls(unrealizedPnl) + '">' + (unrealizedPnl >= 0 ? '+' : '') + fmtMoney(unrealizedPnl) + '</div><div class="sub">' + openCount + ' open positions</div></div>' +
      '<div class="metric"><div class="eyebrow">Total P/L</div><div class="value ' + signCls(totalGain) + '">' + fmtPct(totalReturn) + '</div><div class="sub">' + (totalGain >= 0 ? '+' : '') + fmtMoney(totalGain) + '</div></div>' +
    '</section>';

  let leaderHtml = '<div class="section-title">Best-performing books</div><div class="leader">';
  top3.forEach((b, i) => {
    const g = Number(b.growth_pct || 0);
    const maxG = Number(top3[0].growth_pct || 1);
    const barW = maxG > 0 ? Math.round((g / maxG) * 100) : 0;
    const model = (b.target_model || 'fixed') === 'volatility' ? '<span class="tag vol">Volatility</span>' : '<span class="tag">Fixed</span>';
    const closedCount = (D.closed_trades || []).filter(c => c.book_key === b.book_key && c.research_valid !== false).length;
    leaderHtml +=
      '<div class="card rank">' +
        '<div class="rank-top"><div><h3>' + esc(STRAT_LABELS[b.portfolio] || b.portfolio || '') + ' · ' + esc(RULE_LABEL[b.exit_rule] || b.exit_rule || '') + '</h3>' + model + '</div><span class="rank-num">#' + (i + 1) + '</span></div>' +
        '<div class="return ' + signCls(g) + '">' + fmtPct(g) + '</div>' +
        '<div class="bar"><span style="width:' + Math.max(barW, 2) + '%"></span></div>' +
        '<div class="rank-foot"><span>' + closedCount + ' closed · ' + (b.open_count || 0) + ' open</span><span>' + fmtMoney(b.total_equity) + '</span></div>' +
      '</div>';
  });
  leaderHtml += '</div>';

  let lowerHtml = '<section class="lower"><div class="card"><h2 class="section-title" style="margin-top:0">All books by return</h2>';
  sorted.forEach(b => {
    const g = Number(b.growth_pct || 0);
    const model = (b.target_model || 'fixed') === 'volatility' ? ' · VOL' : '';
    lowerHtml +=
      '<div class="book-row">' +
        '<div class="name">' + esc(STRAT_LABELS[b.portfolio] || b.portfolio || '') + ' · ' + esc(RULE_LABEL[b.exit_rule] || b.exit_rule || '') + model +
          '<small>' + fmtMoney(b.total_equity) + ' equity · ' + (b.open_count || 0) + ' open</small>' +
        '</div>' +
        '<span class="spark ' + signCls(g) + '">' + (g >= 0 ? '+' : '') + fmtMoney(b.growth_dollars || 0) + '</span>' +
      '</div>';
  });
  lowerHtml += '</div>';

  lowerHtml += '<div class="card"><h2 class="section-title" style="margin-top:0">Experiment summary</h2>';
  lowerHtml += '<div class="book-row"><div class="name">Total books</div><span class="spark">' + bookCount + '</span></div>';
  lowerHtml += '<div class="book-row"><div class="name">Open positions</div><span class="spark">' + openCount + '</span></div>';
  lowerHtml += '<div class="book-row"><div class="name">Closed trades</div><span class="spark">' + closedTrades.filter(c => c.research_valid !== false).length + '</span></div>';

  const fixedBooks = books.filter(b => (b.target_model || 'fixed') === 'fixed');
  const volBooks = books.filter(b => b.target_model === 'volatility');
  const fixedEq = fixedBooks.reduce((s, b) => s + Number(b.total_equity || 0), 0);
  const volEq = volBooks.reduce((s, b) => s + Number(b.total_equity || 0), 0);
  lowerHtml += '<div class="book-row"><div class="name">Fixed model equity<small>' + fixedBooks.length + ' books</small></div><span class="spark">' + fmtMoney(fixedEq) + '</span></div>';
  if (volBooks.length > 0) {
    lowerHtml += '<div class="book-row"><div class="name">Volatility model equity<small>' + volBooks.length + ' books (pilot)</small></div><span class="spark">' + fmtMoney(volEq) + '</span></div>';
  }

  lowerHtml += '<div class="note" style="margin-top:16px"><strong>Reference paths only.</strong> Any growth comparisons shown are reference lines, not targets, promises, or forecasts. The system must never alter trading behavior to chase a dashboard reference line.</div>';
  lowerHtml += '</div></section>';

  const footnote = '<div class="footnote"><strong>Model:</strong> ' + esc(D.model || '') + '</div>';

  document.getElementById('content').innerHTML = heroHtml + metricsHtml + leaderHtml + lowerHtml + footnote;
}

loadData();
</script>
</body>
</html>
